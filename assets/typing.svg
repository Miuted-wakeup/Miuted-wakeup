<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 35" width="450" height="35">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="wrapper">
      <div class="line line-1">>_system_booting<span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span><span class="cursor">_</span></div>
      <div class="line line-2">Bienvenido<span class="cursor">_</span></div>
      <div class="line line-3">Full Stack Dev<span class="cursor">_</span></div>
      <div class="line line-4">Cali, Colombia<span class="cursor">_</span></div>
      <div class="line line-5">Me gusta el café<span class="cursor">_</span></div>
    </div>

    <style xmlns="http://www.w3.org/1999/xhtml">
      .wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
      }
      
      .line {
        position: absolute;
        top: 0;
        left: 0;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        color: #FF66CC;
        font-size: 22px;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        opacity: 0;
      }

      .cursor {
        display: inline-block;
        animation: blink 0.6s step-end infinite;
      }

      .dot-1, .dot-2, .dot-3 {
        opacity: 0;
      }

      /* Animaciones de las líneas */
      .line-1 {
        animation: line1-anim 40s infinite;
      }
      .line-1 .dot-1 {
        animation: dot1-anim 40s infinite;
      }
      .line-1 .dot-2 {
        animation: dot2-anim 40s infinite;
      }
      .line-1 .dot-3 {
        animation: dot3-anim 40s infinite;
      }

      .line-2 {
        animation: line2-anim 40s infinite;
      }

      .line-3 {
        animation: line3-anim 40s infinite;
      }

      .line-4 {
        animation: line4-anim 40s infinite;
      }

      .line-5 {
        animation: line5-anim 40s infinite;
      }

      /* Cursores intermitentes */
      @keyframes blink {
        from, to { color: transparent }
        50% { color: #FF66CC }
      }

      /* Línea 1: >_system_booting... (con paso a paso de máquina de escribir) */
      @keyframes line1-anim {
        0% { width: 0; opacity: 1; }
        2% { opacity: 1; animation-timing-function: steps(18, end); }
        10% { width: 18ch; opacity: 1; } /* Escribe ">_system_booting" + cursor */
        11% { width: 21ch; }
        19.5% { opacity: 1; }
        20%, 100% { opacity: 0; width: 0; }
      }

      @keyframes dot1-anim {
        0%, 11% { opacity: 0; }
        12%, 100% { opacity: 1; }
      }

      @keyframes dot2-anim {
        0%, 13% { opacity: 0; }
        14%, 100% { opacity: 1; }
      }

      @keyframes dot3-anim {
        0%, 15% { opacity: 0; }
        16%, 100% { opacity: 1; }
      }

      /* Línea 2: Bienvenido */
      @keyframes line2-anim {
        0%, 20% { width: 0; opacity: 0; }
        21% { opacity: 1; animation-timing-function: steps(11, end); }
        30% { width: 11ch; opacity: 1; } /* "Bienvenido" + cursor */
        39.5% { opacity: 1; }
        40%, 100% { opacity: 0; width: 0; }
      }

      /* Línea 3: Full Stack Dev */
      @keyframes line3-anim {
        0%, 40% { width: 0; opacity: 0; }
        41% { opacity: 1; animation-timing-function: steps(15, end); }
        50% { width: 15ch; opacity: 1; } /* "Full Stack Dev" + cursor */
        59.5% { opacity: 1; }
        60%, 100% { opacity: 0; width: 0; }
      }

      /* Línea 4: Cali, Colombia */
      @keyframes line4-anim {
        0%, 60% { width: 0; opacity: 0; }
        61% { opacity: 1; animation-timing-function: steps(15, end); }
        70% { width: 15ch; opacity: 1; } /* "Cali, Colombia" + cursor */
        79.5% { opacity: 1; }
        80%, 100% { opacity: 0; width: 0; }
      }

      /* Línea 5: Me gusta el café */
      @keyframes line5-anim {
        0%, 80% { width: 0; opacity: 0; }
        81% { opacity: 1; animation-timing-function: steps(17, end); }
        90% { width: 17ch; opacity: 1; } /* "Me gusta el café" + cursor */
        99.5% { opacity: 1; }
        100% { opacity: 0; width: 0; }
      }
    </style>
  </foreignObject>
</svg>
