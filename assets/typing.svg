<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 35" width="450" height="35">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="wrapper">
      <div class="line line-1"><span class="type-text t1">>_system_booting</span><span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span><span class="cursor">_</span></div>
      <div class="line line-2"><span class="type-text t2">Bienvenido</span><span class="cursor">_</span></div>
      <div class="line line-3"><span class="type-text t3">Full Stack Dev</span><span class="cursor">_</span></div>
      <div class="line line-4"><span class="type-text t4">Cali, Colombia</span><span class="cursor">_</span></div>
      <div class="line line-5"><span class="type-text t5">Me gusta el café</span><span class="cursor">_</span></div>
    </div>

    <style xmlns="http://www.w3.org/1999/xhtml">
      .wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
      }
      
      .line {
        position: absolute;
        top: 0;
        left: 0;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        color: #FF66CC;
        font-size: 22px;
        white-space: nowrap;
        opacity: 0;
      }

      .type-text {
        display: inline-block;
        vertical-align: bottom;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
      }

      .cursor {
        display: inline-block;
        animation: blink 0.6s step-end infinite;
      }

      .dot-1, .dot-2, .dot-3 {
        opacity: 0;
      }

      /* Animaciones de las líneas (opacidad) - Loop de 20 segundos */
      .line-1 { animation: line1-fade 20s infinite; }
      .line-1 .dot-1 { animation: dot1-anim 20s infinite; }
      .line-1 .dot-2 { animation: dot2-anim 20s infinite; }
      .line-1 .dot-3 { animation: dot3-anim 20s infinite; }

      .line-2 { animation: line2-fade 20s infinite; }
      .line-3 { animation: line3-fade 20s infinite; }
      .line-4 { animation: line4-fade 20s infinite; }
      .line-5 { animation: line5-fade 20s infinite; }

      /* Animaciones de tipeado manual - Loop de 20 segundos */
      .t1 { animation: type1-anim 20s infinite; }
      .t2 { animation: type2-anim 20s infinite; }
      .t3 { animation: type3-anim 20s infinite; }
      .t4 { animation: type4-anim 20s infinite; }
      .t5 { animation: type5-anim 20s infinite; }

      /* Cursores intermitentes */
      @keyframes blink {
        from, to { color: transparent }
        50% { color: #FF66CC }
      }

      /* Opacidad de las líneas */
      @keyframes line1-fade {
        0%, 19.5% { opacity: 1; }
        20%, 100% { opacity: 0; }
      }
      @keyframes line2-fade {
        0%, 19.9% { opacity: 0; }
        20%, 39.5% { opacity: 1; }
        40%, 100% { opacity: 0; }
      }
      @keyframes line3-fade {
        0%, 39.9% { opacity: 0; }
        40%, 59.5% { opacity: 1; }
        60%, 100% { opacity: 0; }
      }
      @keyframes line4-fade {
        0%, 59.9% { opacity: 0; }
        60%, 79.5% { opacity: 1; }
        80%, 100% { opacity: 0; }
      }
      @keyframes line5-fade {
        0%, 79.9% { opacity: 0; }
        80%, 99.5% { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Puntos de carga */
      @keyframes dot1-anim {
        0%, 9.9% { opacity: 0; }
        10%, 100% { opacity: 1; }
      }
      @keyframes dot2-anim {
        0%, 12.9% { opacity: 0; }
        13%, 100% { opacity: 1; }
      }
      @keyframes dot3-anim {
        0%, 15.9% { opacity: 0; }
        16%, 100% { opacity: 1; }
      }

      /* Tipeado veloz paso a paso */
      @keyframes type1-anim {
        0%, 1.99% { width: 0; }
        2.00% { width: 0; }
        2.31% { width: 1ch; }
        2.62% { width: 2ch; }
        2.93% { width: 3ch; }
        3.25% { width: 4ch; }
        3.56% { width: 5ch; }
        3.87% { width: 6ch; }
        4.18% { width: 7ch; }
        4.50% { width: 8ch; }
        4.81% { width: 9ch; }
        5.12% { width: 10ch; }
        5.43% { width: 11ch; }
        5.75% { width: 12ch; }
        6.06% { width: 13ch; }
        6.37% { width: 14ch; }
        6.68% { width: 15ch; }
        7.00%, 20% { width: 16ch; }
        20.1%, 100% { width: 0; }
      }

      @keyframes type2-anim {
        0%, 21.99% { width: 0; }
        22.0% { width: 0; }
        22.5% { width: 1ch; }
        23.0% { width: 2ch; }
        23.5% { width: 3ch; }
        24.0% { width: 4ch; }
        24.5% { width: 5ch; }
        25.0% { width: 6ch; }
        25.5% { width: 7ch; }
        26.0% { width: 8ch; }
        26.5% { width: 9ch; }
        27.0%, 40% { width: 10ch; }
        40.1%, 100% { width: 0; }
      }

      @keyframes type3-anim {
        0%, 41.99% { width: 0; }
        42.0% { width: 0; }
        42.36% { width: 1ch; }
        42.72% { width: 2ch; }
        43.08% { width: 3ch; }
        43.44% { width: 4ch; }
        43.80% { width: 5ch; }
        44.16% { width: 6ch; }
        44.52% { width: 7ch; }
        44.88% { width: 8ch; }
        45.24% { width: 9ch; }
        45.60% { width: 10ch; }
        45.96% { width: 11ch; }
        46.32% { width: 12ch; }
        46.68% { width: 13ch; }
        47.00%, 60% { width: 14ch; }
        60.1%, 100% { width: 0; }
      }

      @keyframes type4-anim {
        0%, 61.99% { width: 0; }
        62.0% { width: 0; }
        62.36% { width: 1ch; }
        62.72% { width: 2ch; }
        63.08% { width: 3ch; }
        63.44% { width: 4ch; }
        63.80% { width: 5ch; }
        64.16% { width: 6ch; }
        64.52% { width: 7ch; }
        64.88% { width: 8ch; }
        65.24% { width: 9ch; }
        65.60% { width: 10ch; }
        65.96% { width: 11ch; }
        66.32% { width: 12ch; }
        66.68% { width: 13ch; }
        67.00%, 80% { width: 14ch; }
        80.1%, 100% { width: 0; }
      }

      @keyframes type5-anim {
        0%, 81.99% { width: 0; }
        82.00% { width: 0; }
        82.31% { width: 1ch; }
        82.62% { width: 2ch; }
        82.93% { width: 3ch; }
        83.25% { width: 4ch; }
        83.56% { width: 5ch; }
        83.87% { width: 6ch; }
        84.18% { width: 7ch; }
        84.50% { width: 8ch; }
        84.81% { width: 9ch; }
        85.12% { width: 10ch; }
        85.43% { width: 11ch; }
        85.75% { width: 12ch; }
        86.06% { width: 13ch; }
        86.37% { width: 14ch; }
        86.68% { width: 15ch; }
        87.00%, 100% { width: 16ch; }
      }
    </style>
  </foreignObject>
</svg>
