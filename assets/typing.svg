<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 35" width="450" height="35">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="wrapper">
      <div class="line line-1"><span class="type-text t1">>_system_booting</span><span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span><span class="cursor">_</span></div>
      <div class="line line-2"><span class="type-text t2">Bienvenido</span><span class="cursor">_</span></div>
      <div class="line line-3"><span class="type-text t3">Full Stack Dev</span><span class="cursor">_</span></div>
      <div class="line line-4"><span class="type-text t4">Cali, Colombia</span><span class="cursor">_</span></div>
      <div class="line line-5"><span class="type-text t5">Me gusta el café</span><span class="cursor">_</span></div>
    </div>

    <style xmlns="http://www.w3.org/1999/xhtml">
      .wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
      }
      
      .line {
        position: absolute;
        top: 0;
        left: 0;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        color: #FF66CC;
        font-size: 22px;
        white-space: nowrap;
        opacity: 0;
      }

      .type-text {
        display: inline-block;
        vertical-align: bottom;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
      }

      .cursor {
        display: inline-block;
        animation: blink 0.6s step-end infinite;
      }

      .dot-1, .dot-2, .dot-3 {
        opacity: 0;
      }

      /* Animaciones de las líneas (opacidad) */
      .line-1 { animation: line1-fade 40s infinite; }
      .line-1 .dot-1 { animation: dot1-anim 40s infinite; }
      .line-1 .dot-2 { animation: dot2-anim 40s infinite; }
      .line-1 .dot-3 { animation: dot3-anim 40s infinite; }

      .line-2 { animation: line2-fade 40s infinite; }
      .line-3 { animation: line3-fade 40s infinite; }
      .line-4 { animation: line4-fade 40s infinite; }
      .line-5 { animation: line5-fade 40s infinite; }

      /* Animaciones de tipeado manual */
      .t1 { animation: type1-anim 40s infinite; }
      .t2 { animation: type2-anim 40s infinite; }
      .t3 { animation: type3-anim 40s infinite; }
      .t4 { animation: type4-anim 40s infinite; }
      .t5 { animation: type5-anim 40s infinite; }

      /* Cursores intermitentes */
      @keyframes blink {
        from, to { color: transparent }
        50% { color: #FF66CC }
      }

      /* Opacidad de las líneas */
      @keyframes line1-fade {
        0%, 19.5% { opacity: 1; }
        20%, 100% { opacity: 0; }
      }
      @keyframes line2-fade {
        0%, 19.9% { opacity: 0; }
        20%, 39.5% { opacity: 1; }
        40%, 100% { opacity: 0; }
      }
      @keyframes line3-fade {
        0%, 39.9% { opacity: 0; }
        40%, 59.5% { opacity: 1; }
        60%, 100% { opacity: 0; }
      }
      @keyframes line4-fade {
        0%, 59.9% { opacity: 0; }
        60%, 79.5% { opacity: 1; }
        80%, 100% { opacity: 0; }
      }
      @keyframes line5-fade {
        0%, 79.9% { opacity: 0; }
        80%, 99.5% { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Puntos de carga */
      @keyframes dot1-anim {
        0%, 11% { opacity: 0; }
        12%, 100% { opacity: 1; }
      }
      @keyframes dot2-anim {
        0%, 13% { opacity: 0; }
        14%, 100% { opacity: 1; }
      }
      @keyframes dot3-anim {
        0%, 15% { opacity: 0; }
        16%, 100% { opacity: 1; }
      }

      /* Pasos discretos (typewriter real) */
      @keyframes type1-anim {
        0%, 2.49% { width: 0; }
        2.5%, 2.99% { width: 1ch; }
        3.0%, 3.49% { width: 2ch; }
        3.5%, 3.99% { width: 3ch; }
        4.0%, 4.49% { width: 4ch; }
        4.5%, 4.99% { width: 5ch; }
        5.0%, 5.49% { width: 6ch; }
        5.5%, 5.99% { width: 7ch; }
        6.0%, 6.49% { width: 8ch; }
        6.5%, 6.99% { width: 9ch; }
        7.0%, 7.49% { width: 10ch; }
        7.5%, 7.99% { width: 11ch; }
        8.0%, 8.49% { width: 12ch; }
        8.5%, 8.99% { width: 13ch; }
        9.0%, 9.49% { width: 14ch; }
        9.5%, 9.99% { width: 15ch; }
        10.0%, 20% { width: 16ch; }
        20.1%, 100% { width: 0; }
      }

      @keyframes type2-anim {
        0%, 22.79% { width: 0; }
        22.8%, 23.59% { width: 1ch; }
        23.6%, 24.39% { width: 2ch; }
        24.4%, 25.19% { width: 3ch; }
        25.2%, 25.99% { width: 4ch; }
        26.0%, 26.79% { width: 5ch; }
        26.8%, 27.59% { width: 6ch; }
        27.6%, 28.39% { width: 7ch; }
        28.4%, 29.19% { width: 8ch; }
        29.2%, 29.99% { width: 9ch; }
        30.0%, 40% { width: 10ch; }
        40.1%, 100% { width: 0; }
      }

      @keyframes type3-anim {
        0%, 42.59% { width: 0; }
        42.6%, 43.19% { width: 1ch; }
        43.2%, 43.79% { width: 2ch; }
        43.8%, 44.39% { width: 3ch; }
        44.4%, 44.99% { width: 4ch; }
        45.0%, 45.59% { width: 5ch; }
        45.6%, 46.19% { width: 6ch; }
        46.2%, 46.79% { width: 7ch; }
        46.8%, 47.39% { width: 8ch; }
        47.4%, 47.99% { width: 9ch; }
        48.0%, 48.59% { width: 10ch; }
        48.6%, 49.19% { width: 11ch; }
        49.2%, 49.79% { width: 12ch; }
        49.8%, 50.39% { width: 13ch; }
        50.4%, 60% { width: 14ch; }
        60.1%, 100% { width: 0; }
      }

      @keyframes type4-anim {
        0%, 62.59% { width: 0; }
        62.6%, 63.19% { width: 1ch; }
        63.2%, 63.79% { width: 2ch; }
        63.8%, 64.39% { width: 3ch; }
        64.4%, 64.99% { width: 4ch; }
        65.0%, 65.59% { width: 5ch; }
        65.6%, 66.19% { width: 6ch; }
        66.2%, 66.79% { width: 7ch; }
        66.8%, 67.39% { width: 8ch; }
        67.4%, 67.99% { width: 9ch; }
        68.0%, 68.59% { width: 10ch; }
        68.6%, 69.19% { width: 11ch; }
        69.2%, 69.79% { width: 12ch; }
        69.8%, 70.39% { width: 13ch; }
        70.4%, 80% { width: 14ch; }
        80.1%, 100% { width: 0; }
      }

      @keyframes type5-anim {
        0%, 82.49% { width: 0; }
        82.5%, 82.99% { width: 1ch; }
        83.0%, 83.49% { width: 2ch; }
        83.5%, 83.99% { width: 3ch; }
        84.0%, 84.49% { width: 4ch; }
        84.5%, 84.99% { width: 5ch; }
        85.0%, 85.49% { width: 6ch; }
        85.5%, 85.99% { width: 7ch; }
        86.0%, 86.49% { width: 8ch; }
        86.5%, 86.99% { width: 9ch; }
        87.0%, 87.49% { width: 10ch; }
        87.5%, 87.99% { width: 11ch; }
        88.0%, 88.49% { width: 12ch; }
        88.5%, 88.99% { width: 13ch; }
        89.0%, 89.49% { width: 14ch; }
        89.5%, 89.99% { width: 15ch; }
        90.0%, 100% { width: 16ch; }
      }
    </style>
  </foreignObject>
</svg>
